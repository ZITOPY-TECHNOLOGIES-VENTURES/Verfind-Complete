    <script>
      window.process = { env: { API_KEY: "" } };

      /* ── Auto-detect OS/browser colour scheme BEFORE React boots ── */
      (function () {
        var saved = localStorage.getItem('vf-theme');
        var osPrefers = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        /* If user has never manually set a preference, follow the OS */
        var theme = saved || osPrefers;
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.toggle('dark', theme === 'dark');
      })();
    </script>

/* ═══════════════════════════════════════════════════════════════════════
   VERIFIND — iOS 26 Liquid Glass Design System
   Auto-adapts to OS / browser prefers-color-scheme
   ═══════════════════════════════════════════════════════════════════════

   iOS 26 "liquid glass" key properties:
   · Deep backdrop blur (32–60px) + high saturation boost
   · Translucent layered whites/blacks (not solid fills)
   · Subtle specular highlight on top edge (inner border)
   · Iridescent shimmer layer (rainbow gradient at 5–8% opacity)
   · Ultra-smooth corners (28–40px radii)
   · Vibrancy: colours glow slightly through the glass
   · Light mode: frosted white glass on warm ambient canvas
   · Dark mode:  inky translucent glass on deep space canvas
   ═══════════════════════════════════════════════════════════════════════ */

/* ── SHARED BRAND TOKENS (always) ────────────────────────────── */
:root {
  --color-primary:       #0A66C2;
  --color-primary-rgb:   10, 102, 194;
  --color-primary-hover: #0858A8;
  --color-accent:        #E84C3D;
  --bubble-1:            rgba(10, 102, 194, 0.12);
  --bubble-2:            rgba(232, 76, 61,  0.08);

  /* iOS 26 blur levels */
  --blur-glass:    blur(40px) saturate(180%);
  --blur-panel:    blur(28px) saturate(160%);
  --blur-header:   blur(20px) saturate(150%);
  --blur-overlay:  blur(48px) saturate(200%);

  /* Iridescent shimmer (subtle rainbow on glass edges) */
  --shimmer: linear-gradient(
    135deg,
    rgba(255,255,255,0.00) 0%,
    rgba(120,180,255,0.06) 25%,
    rgba(200,120,255,0.05) 50%,
    rgba(120,220,180,0.04) 75%,
    rgba(255,255,255,0.00) 100%
  );

  /* Specular highlight — bright thin line on top of glass */
  --specular-light: inset 0 1px 0 rgba(255,255,255,0.55),
                    inset 0 -1px 0 rgba(255,255,255,0.06);
  --specular-dark:  inset 0 1px 0 rgba(255,255,255,0.14),
                    inset 0 -1px 0 rgba(0,0,0,0.20);
}

/* ══════════════════════════════════════════════
   LIGHT MODE  (warm ambient — iOS Light)
   Applied when: OS=light  OR  data-theme=light
   ══════════════════════════════════════════════ */
:root,
[data-theme="light"] {
  color-scheme: light;

  /* Ambient page — warm off-white, like Apple's parchment */
  --bg-ambient:      #F2F2F7;   /* iOS light system background */
  --bg-ambient-2:    #FFFFFF;   /* secondary grouped background */

  /* Glass surfaces */
  --glass-bg:        rgba(255, 255, 255, 0.72);
  --glass-bg-strong: rgba(255, 255, 255, 0.88);
  --glass-bg-subtle: rgba(255, 255, 255, 0.45);
  --glass-border:    rgba(255, 255, 255, 0.80);
  --glass-border-outer: rgba(0, 0, 0, 0.08);

  /* Semantic aliases used in components */
  --bg-page:         var(--bg-ambient);
  --bg-surface:      var(--glass-bg-strong);
  --bg-surface-alt:  rgba(255, 255, 255, 0.50);
  --bg-input:        rgba(255, 255, 255, 0.80);
  --bg-overlay:      rgba(0, 0, 0, 0.30);

  --text-primary:    #1C1C1E;   /* iOS label */
  --text-secondary:  #3C3C43;   /* iOS secondary label */
  --text-muted:      #8E8E93;   /* iOS tertiary label */
  --text-inverse:    #FFFFFF;

  --border-color:    rgba(60, 60, 67, 0.12);   /* iOS separator */
  --border-strong:   rgba(60, 60, 67, 0.22);

  /* Shadows — soft diffuse, iOS style */
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.07);
  --shadow-sm: 0 2px 8px  rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.09), 0 2px 6px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.11), 0 4px 10px rgba(0,0,0,0.05);
  --shadow-xl: 0 24px 60px rgba(0,0,0,0.13), 0 8px 20px rgba(0,0,0,0.06);

  --header-bg:     rgba(242, 242, 247, 0.85);
  --header-border: rgba(60, 60, 67, 0.10);

  --nav-bg:         rgba(255, 255, 255, 0.80);
  --nav-border:     rgba(60, 60, 67, 0.10);
  --nav-active-bg:  rgba(10, 102, 194, 0.10);
  --nav-active-text: var(--color-primary);
  --nav-text:       #3C3C43;

  --map-bg:         #DCE8F5;

  --specular: var(--specular-light);
}

/* ══════════════════════════════════════════════
   DARK MODE  (deep space — iOS Dark)
   Applied when: OS=dark  OR  data-theme=dark
   ══════════════════════════════════════════════ */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    color-scheme: dark;
    --bg-ambient:      #000000;
    --bg-ambient-2:    #1C1C1E;
    --glass-bg:        rgba(28, 28, 30, 0.72);
    --glass-bg-strong: rgba(44, 44, 46, 0.80);
    --glass-bg-subtle: rgba(28, 28, 30, 0.50);
    --glass-border:    rgba(255, 255, 255, 0.10);
    --glass-border-outer: rgba(255, 255, 255, 0.06);
    --bg-page:         var(--bg-ambient);
    --bg-surface:      var(--glass-bg-strong);
    --bg-surface-alt:  rgba(44, 44, 46, 0.55);
    --bg-input:        rgba(44, 44, 46, 0.80);
    --bg-overlay:      rgba(0, 0, 0, 0.60);
    --text-primary:    #FFFFFF;
    --text-secondary:  rgba(235, 235, 245, 0.75);
    --text-muted:      rgba(235, 235, 245, 0.38);
    --text-inverse:    #000000;
    --border-color:    rgba(255, 255, 255, 0.10);
    --border-strong:   rgba(255, 255, 255, 0.18);
    --shadow-xs: 0 1px 4px rgba(0,0,0,0.5);
    --shadow-sm: 0 2px 10px rgba(0,0,0,0.6);
    --shadow-md: 0 6px 24px rgba(0,0,0,0.65);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.70);
    --shadow-xl: 0 28px 72px rgba(0,0,0,0.80);
    --header-bg:     rgba(0, 0, 0, 0.75);
    --header-border: rgba(255, 255, 255, 0.07);
    --nav-bg:         rgba(28, 28, 30, 0.80);
    --nav-border:     rgba(255, 255, 255, 0.08);
    --nav-active-bg:  rgba(10, 102, 194, 0.22);
    --nav-active-text: #60A5FA;
    --nav-text:       rgba(235, 235, 245, 0.65);
    --map-bg:         #0A0F1A;
    --specular: var(--specular-dark);
    --bubble-1: rgba(10, 102, 194, 0.18);
    --bubble-2: rgba(232, 76, 61,  0.12);
  }
}

/* Manual dark override (user clicked toggle) */
[data-theme="dark"] {
  color-scheme: dark;
  --bg-ambient:      #000000;
  --bg-ambient-2:    #1C1C1E;
  --glass-bg:        rgba(28, 28, 30, 0.72);
  --glass-bg-strong: rgba(44, 44, 46, 0.80);
  --glass-bg-subtle: rgba(28, 28, 30, 0.50);
  --glass-border:    rgba(255, 255, 255, 0.10);
  --glass-border-outer: rgba(255, 255, 255, 0.06);
  --bg-page:         var(--bg-ambient);
  --bg-surface:      var(--glass-bg-strong);
  --bg-surface-alt:  rgba(44, 44, 46, 0.55);
  --bg-input:        rgba(44, 44, 46, 0.80);
  --bg-overlay:      rgba(0, 0, 0, 0.60);
  --text-primary:    #FFFFFF;
  --text-secondary:  rgba(235, 235, 245, 0.75);
  --text-muted:      rgba(235, 235, 245, 0.38);
  --text-inverse:    #000000;
  --border-color:    rgba(255, 255, 255, 0.10);

  --shadow-xs: 0 1px 4px rgba(0,0,0,0.5);

  --shadow-md: 0 6px 24px rgba(0,0,0,0.65);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.70);
  --shadow-xl: 0 28px 72px rgba(0,0,0,0.80);
  --header-bg:     rgba(0, 0, 0, 0.75);
  --header-border: rgba(255, 255, 255, 0.07);
  --nav-bg:         rgba(28, 28, 30, 0.80);
  --nav-border:     rgba(255, 255, 255, 0.08);
  --nav-active-bg:  rgba(10, 102, 194, 0.22);
  --nav-active-text: #60A5FA;
  --nav-text:       rgba(235, 235, 245, 0.65);
  --map-bg:         #0A0F1A;

/* ── Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  overflow: hidden;
  background: var(--bg-page);
  color: var(--text-primary);
  font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  transition: background .3s ease, color .3s ease;
}

/* ══════════════════════════════════════════════
   iOS 26 GLASS MATERIAL CLASSES
   ══════════════════════════════════════════════ */

/* Primary glass — main cards, panels */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: var(--blur-glass);
  -webkit-backdrop-filter: var(--blur-glass);
  border: 1px solid var(--glass-border-outer);
  border-radius: 28px;
  box-shadow: var(--shadow-md), var(--specular);
  position: relative;
  overflow: hidden;
  transition: box-shadow .25s ease;
}
.glass-card::before {
  /* Shimmer layer */
  content: '';
  position: absolute;
  inset: 0;
  background: var(--shimmer);
  pointer-events: none;
  border-radius: inherit;
}
.glass-card:hover { box-shadow: var(--shadow-lg), var(--specular); }

/* Secondary glass — nav bars, sidebars */
.glass {
  background: var(--glass-bg);
  backdrop-filter: var(--blur-panel);
  -webkit-backdrop-filter: var(--blur-panel);
  border: 1px solid var(--glass-border-outer);
  box-shadow: var(--shadow-sm), var(--specular);
}

/* Header glass — ultra-thin */
.glass-header {
  background: var(--header-bg);
  backdrop-filter: var(--blur-header);
  -webkit-backdrop-filter: var(--blur-header);
  border-bottom: 1px solid var(--header-border);
  box-shadow: 0 1px 0 var(--glass-border);
}

/* Frosted input — inputs inside glass panels */
.glass-input {
  background: var(--bg-input);
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--border-color);
  border-radius: 14px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  padding: 11px 14px;
  width: 100%;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
  appearance: none;
}
.glass-input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), .15);
}
.glass-input::placeholder { color: var(--text-muted); }

/* ── Native iOS-style inputs (for Login/Register forms) ── */
input, textarea, select {
  font-family: inherit;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg-input);
  border: 1.5px solid var(--border-color);
  border-radius: 14px;
  padding: 11px 14px;
  width: 100%;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb), .15);
}
input::placeholder, textarea::placeholder { color: var(--text-muted); }
select {
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20'%3e%3cpath fill='%238E8E93' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 12px center;
  background-size: 16px;
  padding-right: 36px;
  cursor: pointer;
}

/* ── Scrollbar ── */
.custom-scrollbar::-webkit-scrollbar { width: 3px; }
.custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb {
  background: var(--border-strong);
  border-radius: 99px;
}

/* ── Spacing tokens (Login / Register) ── */
.p-sm { padding: 12px; }    .p-lg { padding: 32px; }
.px-sm { padding-inline: 12px; }
.pl-xl { padding-left: 44px; }  .pr-sm { padding-right: 12px; }
.py-sm { padding-block: 11px; } .py-xs { padding-block: 6px; }
.gap-xs { gap: 6px; } .gap-sm { gap: 12px; }
.space-y-xs > * + * { margin-top: 4px; }
.space-y-sm > * + * { margin-top: 12px; }
.space-y-md > * + * { margin-top: 20px; }
.text-small { font-size: 13px; }
.text-h2    { font-size: 22px; font-weight: 800; }
.text-secondary  { color: var(--text-secondary); }
.border-border   { border-color: var(--border-color); }
.bg-bg-app       { background: var(--bg-page); }
.bg-primary      { background-color: var(--color-primary); }
.bg-accent       { background-color: var(--color-accent); }
.rounded         { border-radius: 14px; }
.hover\:bg-blue-700:hover   { background-color: var(--color-primary-hover) !important; }
.hover\:bg-orange-700:hover { background-color: #C2410C !important; }
.focus\:border-primary:focus { border-color: var(--color-primary); }
.focus\:ring-2:focus { box-shadow: 0 0 0 3px rgba(var(--color-primary-rgb),.15); }

/* Liquid Background Styles */
.liquid-bg-container {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
  pointer-events: none;
}
.liquid-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.8;
  animation: float-anim ease-in-out infinite alternate;
}

/* ══════════════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════════════ */
@keyframes logo-pulse  { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.06);opacity:1} }
@keyframes text-reveal { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

@keyframes slide-t2    { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

@keyframes ping-anim   { 0%{transform:scale(1);opacity:.8} 75%,100%{transform:scale(2);opacity:0} }
@keyframes spin-anim   { to{transform:rotate(360deg)} }

/* shimmer sweep — for skeleton loaders */
@keyframes shimmer-sweep {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}

.animate-in                   { animation: fade-in .3s ease forwards; }
.fade-in                      { animation: fade-in .3s ease forwards; }
.zoom-in-95                   { animation: zoom-95 .25s ease forwards; }
.slide-in-from-bottom-4       { animation: slide-b4  .3s  ease forwards; }
.slide-in-from-bottom-6       { animation: slide-b6  .45s ease forwards; }
.slide-in-from-bottom-8       { animation: slide-b8  .55s ease forwards; }
.slide-in-from-bottom-10      { animation: slide-b10 .4s  ease forwards; }
.slide-in-from-top-2          { animation: slide-t2  .2s  ease forwards; }
.animate-float                { animation: float-anim 3s ease-in-out infinite; }
.animate-ping                 { animation: ping-anim 1.5s cubic-bezier(0,0,.2,1) infinite; }
.animate-spin                 { animation: spin-anim 1s linear infinite; }

.duration-150  { animation-duration: .15s; }
.duration-200  { animation-duration: .2s;  }
.duration-300  { animation-duration: .3s;  }
.duration-500  { animation-duration: .5s;  }
.duration-700  { animation-duration: .7s;  }
.duration-1000 { animation-duration: 1s;   }

/* ══════════════════════════════════════════════
   PRELOADER  (white glass style)
   ══════════════════════════════════════════════ */
#verifind-preloader {
  position: fixed; inset: 0;
  background: var(--bg-page, #F2F2F7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 9999;
  transition: opacity .4s ease;
}

/* Preloader ambient orbs */
#verifind-preloader::before,
#verifind-preloader::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: .35;
  pointer-events: none;
}
#verifind-preloader::before {
  width: 400px; height: 400px;
  top: -100px; left: -100px;
  background: radial-gradient(circle, rgba(10,102,194,.5) 0%, transparent 70%);
}
#verifind-preloader::after {
  width: 300px; height: 300px;
  bottom: -80px; right: -80px;
  background: radial-gradient(circle, rgba(232,76,61,.4) 0%, transparent 70%);
}

.logo-container { width: 88px; height: 88px; margin-bottom: 24px; position: relative; z-index: 1; }
.logo-svg       { width: 100%; height: 100%; animation: logo-pulse 2s ease-in-out infinite; }
.loader-text    {
  color: var(--text-primary, #1C1C1E);
  font-weight: 800; font-size: 24px; letter-spacing: -.05em;
  opacity: 0; animation: text-reveal .6s forwards .2s;
  position: relative; z-index: 1;
}
.status-line {
  margin-top: 16px; font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .2em;
  color: var(--text-muted, #8E8E93);
  display: flex; align-items: center; gap: 6px;
  position: relative; z-index: 1;
}
.dot {
  width: 4px; height: 4px;
  background: var(--color-primary);
  border-radius: 50%;
  animation: dot-glow 1s infinite alternate;
}
